version: 2
updates:
  # GitHub actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "22:00"
    groups:
      github-actions:
        patterns:
          - "*"
  # go dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: pre-commit
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '22:00'
    open-pull-requests-limit: 5
    labels:
      - 'changelog:dependencies'
